# This workflow will trigger Datadog Synthetic tests within your Datadog organisation
# For more information on running Synthetic tests within your GitHub workflows see: https://docs.datadoghq.com/synthetics/cicd_integrations/github_actions/

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# To get started:

# 1. Add your Datadog API (DD_API_KEY) and Application Key (DD_APP_KEY) as secrets to your GitHub repository. For more information, see: https://docs.datadoghq.com/account_management/api-app-keys/.
# 2. Start using the action within your workflow

name: Run Datadog Synthetic tests

on:
  push:
    branches: [ "ai-story-studio-backend" ]
  pull_request:
    branches: [ "ai-story-studio-backend" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Run Synthetic tests within your GitHub workflow.
    # For additional configuration options visit the action within the marketplace: https://github.com/marketplace/actions/datadog-synthetics-ci
    - name: Run Datadog Synthetic tests
      uses: DataDog/synthetics-ci-github-action@87b505388a22005bb8013481e3f73a367b9a53eb # v1.4.0
      with:
        api_key: ${{ secrets.DD_API_KEY }}
        app_key: ${{ secrets.DD_APP_KEY }}
        test_search_query: 'tag:e2e-tests' #Modify this tag to suit your tagging strategy
        test_run_name: 'GitHub Action Synthetic Test Run'
        test_run_tags: 'github_action,ai-story-studio-backend' #Modify this tag to suit your tagging strategy
        test_run_options: '{"ci": true}' #This will allow you to see the test run in the CI section of the Datadog Synthetic UI
        test_run_timeout: 300 #Timeout for the test run in seconds, adjust as necessary
        test_run_retry: 2 #Number of retries for the test run, adjust as necessary    



    # If you want to ignore the test results, you can uncomment the following line
    # - name: Ignore test results
    #   run: echo "Ignoring test results"



